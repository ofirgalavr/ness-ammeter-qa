[pytest]
markers =
    smoke: Quick sanity check — system starts and responds
    unit: Fast unit tests — no emulators needed
    functional: Functional tests — requires live emulators
    e2e: End-to-end tests — requires live emulators
testpaths = tests
log_file = results/logs/pytest_run.log
log_file_level = INFO
log_cli = false
log_level = INFO
norecursedirs = src Ammeters results venv
addopts = --tb=short