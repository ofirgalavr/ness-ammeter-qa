testing:
  sampling:
    measurements_count: 4
    total_duration_seconds: 10
    sampling_frequency_hz: 0.5

ammeters:
  greenlee:
    port: 5000
    command: "MEASURE_GREENLEE -get_measurement"
  entes:
    port: 5001
    command: "MEASURE_ENTES -get_data"
  circutor:
    port: 5002
    command: "MEASURE_CIRCUTOR -get_measurement -current"

result_management:
  output_dir: "results"

logging:
  level: "INFO"
